<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Quest for Web Publishers</title>
    <!-- Spoqa Han Sans CDN -->
    <link href='https://spoqa.github.io/spoqa-han-sans/css/SpoqaHanSans-kr.css' rel='stylesheet' type='text/css'>
    <script src='https://cdn.tailwindcss.com'></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'spoqa': ['Spoqa Han Sans', 'sans-serif']
                    },
                    backgroundImage: {
                        'hero': "url('/images/bg/hero-bg.webp')",
                        'kf': "url('/images/bg/kf.webp')",
                        'hero': "url('/images/bg/sparkplus.webp')",
                        'hero': "url('/images/bg/wellness.webp')",
                    }
                },
                colors: {
                    transparent: 'transparent',
                    'white': {
                        default: '#FFFFFF'
                    },
                    'dark': {
                        default: '#242424'
                    },
                    'orange': {
                        default: '#F58220'
                    }
                }
            }
        }
    </script>
</head>
<body class='font-spoqa w-screen min-h-screen hidden lg:block'>
    <main class='w-full h-auto text-white-default'>
        <section class='w-full h-screen px-48 pb-[256px] bg-hero bg-cover bg-no-repeat bg-center font-bold leading-8 text-[32px]'>
            <nav class='w-full h-20 py-[26px] block'>
                <ul class='w-full h-full flex flex-row justify-between items-center text-[20px] tracking-[-1%] text-center'>
                    <li class='flex flex-row items-center gap-24'>
                        <div>
                            <a href='/'>
                                <img src='/images/logo.svg' class='w-[300px] h-[26px]' alt='Logo' />
                            </a>
                        </div>
                        <ul class='flex flex-row gap-12'>
                            <li>
                                <a href='#'>센터원</a>
                            </li>
                            <li>
                                <a href='#'>이용안내</a>
                            </li>
                            <li>
                                <a href='#'>서비스소개</a>
                            </li>
                            <li>
                                <a href='#'>임대문의</a>
                            </li>
                            <li>
                                <a href='#'>고객지원</a>
                            </li>
                        </ul>
                    </li>
                    <li>
                        <a href='/'>
                            <img src='/images/globe.svg' alt='Globe' />
                        </a>
                    </li>
                </ul>
            </nav>
            <div class='h-full flex items-end'>
                <div class='flex flex-col gap-20'>
                    <p>
                        <img src='/images/head-title.svg' alt='The 1st Building' />
                    </p>
                    <div class='flex flex-col gap-[18px] tracking-[-3%]'>
                        <p class='leading-[47.36px]'>최고의 공간을 경험하세요</p>
                        <p class='font-normal text-[20px] leading-[30px]'>국내를 넘어 세계의 무대를 준비하는 여러분들과 함께 합니다.</p>
                    </div>
                </div>
            </div>
        </section>
        <section class='w-full h-screen bg-dark-default flex items-center px-48'>
            <div class='flex flex-col gap-40'>
                <div class='flex flex-col tracking-[-1%] text-[40px] leading-[64px]'>
                    <h3 class='tracking-[-1.4%]'>Convenience</h3>
                    <p>미래에셋센터원에서 경험하는 <span class='text-orange-default'>특별한 서비스</span></p>
                </div>
                <div class='w-full flex flex-row gap-5'>
                    <div class='w-[499px] h-auto flex flex-col gap-6'>
                        <div class=''></div>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
